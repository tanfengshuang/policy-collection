apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: policy-odf-noobaa
spec:
  remediationAction: enforce
  severity: medium
  pruneObjectBehavior: DeleteIfCreated
  object-templates:
    # Create pvPool BackingStore for local Ceph storage
    - complianceType: musthave
      objectDefinition:
        apiVersion: noobaa.io/v1alpha1
        kind: BackingStore
        metadata:
          name: noobaa-pv-backing-store
          namespace: openshift-storage
        spec:
          type: pv-pool
          pvPool:
            numVolumes: 3
            resources:
              requests:
                storage: 50Gi
            storageClass: ocs-storagecluster-ceph-rbd
    # Delete the default aws-s3 BackingStore created by NooBaa operator
    - complianceType: mustnothave
      objectDefinition:
        apiVersion: noobaa.io/v1alpha1
        kind: BackingStore
        metadata:
          name: noobaa-default-backing-store
          namespace: openshift-storage
    # Recreate BucketClass with only pvPool BackingStore
    - complianceType: musthave
      objectDefinition:
        apiVersion: noobaa.io/v1alpha1
        kind: BucketClass
        metadata:
          name: noobaa-default-bucket-class
          namespace: openshift-storage
        spec:
          placementPolicy:
            tiers:
              - backingStores:
                  - noobaa-pv-backing-store
